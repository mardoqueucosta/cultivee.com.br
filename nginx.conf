server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Location relativo nos redirects (atras de Cloudflare/Traefik o scheme visto
    # aqui e http; absoluto geraria 301 para http:// e um hop extra).
    absolute_redirect off;

    # www -> apex 301 (o Traefik roteia os dois hosts para este mesmo container)
    if ($host = 'www.cultivee.com.br') {
        return 301 https://cultivee.com.br$request_uri;
    }

    # Barra final -> sem barra (301). Elimina os 403 de diretorio (ex.: /blog/) e
    # as duplicatas da home nas variantes com barra. A raiz "/" nao casa no regex.
    rewrite ^/(.+)/$ /$1 permanent;

    # Bundles com hash no nome: cache imutavel de 1 ano.
    # ^~ para nao cair no location regex de midia abaixo.
    location ^~ /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri =404;
    }

    # Imagens e midia: 30 dias.
    location ~* \.(jpg|jpeg|png|webp|avif|gif|svg|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=2592000";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri =404;
    }

    # Raiz: try_files nao resolve "/" (diretorio) e o =404 impede o modulo index
    # de agir — sem este bloco a HOME devolve 404. Nao remover.
    location = / {
        add_header Cache-Control "no-cache";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files /index.html =404;
    }

    # Paginas: o site e SSG (vite-react-ssg) — TODA rota valida existe como .html
    # fisico no dist (blog/:slug via getStaticPaths). Rota inexistente = 404 REAL
    # com a pagina /404 pre-renderizada (noindex), nunca 200 com a home (soft-404).
    location / {
        add_header Cache-Control "no-cache";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri $uri.html =404;
    }

    error_page 404 /404.html;
}
